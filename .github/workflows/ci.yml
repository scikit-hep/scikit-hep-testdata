name: CI

on:
  pull_request:
  push:
    branches: main
  release:
    types:
      - published

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.10'
        - '3.14'
    name: Check Python ${{ matrix.python-version }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package
      run: pip install .[test]

    - name: Test regular package
      run: pytest

    - name: Uninstall package
      run: pip uninstall -y scikit-hep-testdata

    - name: Install package
      run: pip install -e .[test]

    - name: Requirements list
      run: python -m pip list

    - name: Test package
      run: python -m pytest ./tests --cov=src/skhep_testdata --cov-report=xml

    - name: Test coverage with Codecov
      uses: codecov/codecov-action@v6
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  dist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Build wheel and SDist
      run: pipx run build

    - name: Show sizes
      run: ls -lh dist

    - uses: actions/upload-artifact@v7
      with:
        name: DistPackage
        path: dist

  publish:
    environment:
      name: pypi
      url: https://pypi.org/p/scikit-hep-testdata/
    needs: [dist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    permissions:
      id-token: write
      attestations: write
      artifact-metadata: write
      contents: read
    steps:
    - uses: actions/download-artifact@v8
      with:
        name: DistPackage
        path: dist

    - name: List distributions to be deployed
      run: ls -lha dist/

    - name: Generate artifact attestation for sdist and wheel
      uses: actions/attest-build-provenance@v4
      with:
        subject-path: dist/scikit_hep_testdata-*

    - uses: pypa/gh-action-pypi-publish@release/v1
      with:
        print-hash: true

  pass:
    if: always()
    needs: [checks, dist]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Decide whether the needed jobs succeeded or failed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
